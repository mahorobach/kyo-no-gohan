<defs>
  <filter id="grain" x="0" y="0" width="100%" height="100%">
    <feTurbulence baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" seed="3"></feTurbulence>
    <feColorMatrix values="0 0 0 0 0.16  0 0 0 0 0.12  0 0 0 0 0.08  0 0 0 0.05 0"></feColorMatrix>
  </filter>
  <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
