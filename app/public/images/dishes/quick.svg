  </filter>
  <radialGradient id="bowlShadow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="rgba(0,0,0,0)"></stop>
    <stop offset="85%" stop-color="rgba(0,0,0,0)"></stop>
    <stop offset="100%" stop-color="rgba(42,31,20,0.18)"></stop>
  </radialGradient>
  <radialGradient id="ambBroth" cx="50%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#E8B870"></stop>
    <stop offset="100%" stop-color="#A87A3E"></stop>
  </radialGradient>
  <radialGradient id="misoBroth" cx="50%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#D4A055"></stop>
    <stop offset="100%" stop-color="#7A4F1E"></stop>
  </radialGradient>
  <radialGradient id="redSauce" cx="50%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#D86048"></stop>
    <stop offset="100%" stop-color="#8E2D1F"></stop>
  </radialGradient>
  <radialGradient id="lacquerSheen" cx="40%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#5C3A28"></stop>
    <stop offset="100%" stop-color="#2A1810"></stop>
  </radialGradient>
</defs>
